<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow"><title>Gabe Paoli - Job HQ</title>
<style>
:root{--teal:#0E7C7B;--deep:#0c4f4d;--cyan:#16b5ab;--wash:#EAF5F3;--ink:#16242a;--grey:#5b6b6b;--line:#d3e7e4;--applied:#1f9d57;--interviewing:#c98a00;--rejected:#b23b3b;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;color:var(--ink);background:#f5faf9;font-size:15px;line-height:1.5}
a{color:var(--teal);text-decoration:none}
.gate{position:fixed;inset:0;background:var(--deep);display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff;z-index:50;padding:24px}
.gate h1{font-size:30px;font-weight:800}.gate h1 .g{color:var(--cyan)}
.gate p{color:#bfeee9;margin:8px 0 18px;font-size:14px}
.gate input#pw{padding:13px 16px;border-radius:10px;border:none;font-size:16px;width:min(360px,90vw)}
.gate label{color:#bfeee9;font-size:13px;margin-top:12px;display:flex;align-items:center;gap:8px;width:min(360px,90vw)}
.gate label input{flex:0 0 auto;width:auto;margin:0}
.gate button{margin-top:14px;background:var(--cyan);color:var(--deep);font-weight:800;border:none;padding:13px 22px;border-radius:10px;font-size:15px;cursor:pointer}
.gate .err{color:#ffd9d9;font-size:13px;margin-top:12px;min-height:16px}
header{background:var(--deep);color:#fff;padding:18px 18px 0;position:sticky;top:0;z-index:10}
header .brand{font-size:22px;font-weight:800}header .brand .g{color:var(--cyan)}
header .sub{color:#bfeee9;font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-top:2px}
header .out{position:absolute;top:18px;right:18px;color:#bfeee9;font-size:12px;cursor:pointer;border:1px solid #2f6f6c;border-radius:20px;padding:4px 10px}
nav{display:flex;gap:4px;margin-top:14px}
nav button{background:transparent;border:none;color:#bfeee9;font-weight:700;font-size:14px;padding:10px 14px;border-radius:8px 8px 0 0;cursor:pointer}
nav button.on{background:#f5faf9;color:var(--ink)}
main{padding:18px;max-width:900px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px}
.stat{background:#fff;border:1px solid var(--line);border-left:4px solid var(--teal);border-radius:10px;padding:14px}
.stat .n{font-size:30px;font-weight:800;color:var(--teal);line-height:1}
.stat .l{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--grey);margin-top:6px;font-weight:700}
.stat.applied{border-left-color:var(--applied)}.stat.applied .n{color:var(--applied)}
.stat.interviewing{border-left-color:var(--interviewing)}.stat.interviewing .n{color:var(--interviewing)}
.delta{margin:14px 0 4px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:14px}
.delta .up{color:var(--applied);font-weight:800}.delta .dn{color:var(--rejected);font-weight:800}
.hint{color:var(--grey);font-size:13px;margin:14px 0 8px}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px}
.card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.card .co{color:var(--teal);font-weight:800;font-size:12px;letter-spacing:1px;text-transform:uppercase}
.card .ro{font-size:17px;font-weight:800;margin-top:2px}
.fit{background:var(--wash);color:var(--teal);font-weight:800;font-size:12px;padding:4px 9px;border-radius:30px;white-space:nowrap}
.badge{display:inline-block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:3px 9px;border-radius:30px;color:#fff}
.badge.ready{background:var(--teal)}.badge.applied{background:var(--applied)}.badge.interviewing{background:var(--interviewing)}.badge.rejected{background:var(--rejected)}.badge.archived{background:#7a8787}.badge.closed{background:#7a8787}
.new{background:var(--cyan);color:var(--deep);font-size:10px;font-weight:800;padding:3px 8px;border-radius:30px;text-transform:uppercase}
.topright{text-align:right;white-space:nowrap}
.pchip{font-size:11px;color:var(--grey);font-weight:600;margin-top:5px}
.tl-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}
.tl-green{background:#1f9d57}.tl-amber{background:#c98a00}.tl-red{background:#b23b3b}
.salrow{display:flex;flex-wrap:wrap;gap:6px 14px;align-items:center;margin-top:9px;font-size:13px}
.salrow .sal{font-weight:800;color:var(--ink)}
.cvrec{color:var(--grey)}.cvrec b{color:var(--teal)}
.bandf{display:flex;gap:11px;align-items:center;font-size:12.5px;font-weight:700;color:var(--grey);flex-wrap:wrap}
.bandf label{display:flex;align-items:center;gap:4px;cursor:pointer}
.dotg{color:#1f9d57}.dota{color:#c98a00}.dotr{color:#b23b3b}
.row{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;align-items:center}
.btn{border:1px solid var(--teal);color:var(--teal);background:#fff;font-weight:700;font-size:13px;padding:8px 12px;border-radius:8px;cursor:pointer}
.btn.apply{background:var(--cyan);border-color:var(--cyan);color:#073b39}
select.status{font-weight:700;font-size:13px;padding:8px 10px;border-radius:8px;border:1px solid var(--line);color:var(--ink)}
.docrow{display:block;background:#fff;border:1px solid var(--line);border-left:4px solid var(--teal);border-radius:10px;padding:12px 14px;margin-bottom:10px;font-weight:700;cursor:pointer}
.docrow span{display:block;color:var(--grey);font-weight:400;font-size:12px;margin-top:2px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:30px;font-size:14px;opacity:0;transition:opacity .2s;z-index:30}
.toast.show{opacity:1}
.muted{color:var(--grey);font-size:13px}
details{margin-top:10px}summary{cursor:pointer;color:var(--teal);font-weight:700;font-size:13px}
pre.tpl{white-space:pre-wrap;background:var(--wash);border-radius:8px;padding:10px;font-size:12.5px;margin-top:8px;font-family:inherit}
.closedwrap summary{color:var(--grey)}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.controls select{font-size:13px;font-weight:700;padding:9px 11px;border-radius:8px;border:1px solid var(--line);color:var(--ink);background:#fff}
.tl{margin-top:10px;font-size:12px;color:var(--grey);display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.tl b{color:var(--teal)}
</style></head><body>
<div class="gate" id="gate">
  <h1><span class="g">Gabe</span> Paoli - Job HQ</h1>
  <p>Enter your passphrase to unlock.</p>
  <input id="pw" type="password" placeholder="passphrase" autocomplete="current-password">
  <label><input type="checkbox" id="remember" checked> Keep me signed in on this device</label>
  <button onclick="unlock()">Unlock</button>
  <div class="err" id="err"></div>
</div>
<header id="hdr" style="display:none">
  <div class="out" onclick="signout()">Sign out</div>
  <div class="brand"><span class="g">Gabe</span> Paoli - Job HQ</div>
  <div class="sub">Your private application HQ</div>
  <nav><button class="on" onclick="tab('dash',this)">Dashboard</button><button onclick="tab('jobs',this)">Jobs</button><button onclick="tab('docs',this)">Documents</button></nav>
</header>
<main id="app" style="display:none">
  <section id="dash"></section>
  <section id="jobs" style="display:none"></section>
  <section id="docs" style="display:none"></section>
</main>
<div class="toast" id="toast"></div>
<script src="config.enc.js"></script>
<script>
let CFG=null;
const b64d=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function decryptCfg(pw){
  const raw=b64d(window.ENC_CONFIG),salt=raw.slice(0,16),iv=raw.slice(16,28),ct=raw.slice(28);
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:window.KDF_ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
  return JSON.parse(new TextDecoder().decode(pt));
}
async function unlock(){
  const pw=document.getElementById('pw').value, err=document.getElementById('err');
  try{ CFG=await decryptCfg(pw);
    (document.getElementById('remember').checked?localStorage:sessionStorage).setItem('cfg',JSON.stringify(CFG));
    show();
  }catch(e){ err.textContent='Wrong passphrase. Try again.'; }
}
function show(){document.getElementById('gate').style.display='none';document.getElementById('hdr').style.display='block';document.getElementById('app').style.display='block';load();}
function signout(){localStorage.removeItem('cfg');sessionStorage.removeItem('cfg');location.hash='';location.reload();}
async function tq(sql,args){
  const stmt=args?{sql,args:args.map(v=>({type:typeof v==='number'?'float':'text',value:String(v)}))}:{sql};
  const r=await fetch(CFG.url+'/v2/pipeline',{method:'POST',headers:{'Authorization':'Bearer '+CFG.token,'Content-Type':'application/json'},body:JSON.stringify({requests:[{type:'execute',stmt},{type:'close'}]})});
  const j=await r.json(),res=j.results[0]; if(res.type!=='ok')throw new Error(JSON.stringify(j));
  const rr=res.response.result; return rr.rows.map(row=>{const o={};rr.cols.forEach((c,i)=>o[c.name]=row[i]&&row[i].value);return o;});
}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600);}
function copy(txt,what){
  const ok=()=>toast((what||'Copied')+' copied');
  if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(txt).then(ok).catch(()=>fbcopy(txt,ok));}
  else fbcopy(txt,ok);
}
function fbcopy(txt,ok){const t=document.createElement('textarea');t.value=txt;t.style.position='fixed';t.style.top='0';t.style.opacity='0';document.body.appendChild(t);t.focus();t.select();let done=false;try{done=document.execCommand('copy');}catch(e){}document.body.removeChild(t);done?ok():toast('Copy failed - open the details below to select it');}
function tab(id,btn){for(const s of['dash','jobs','docs'])document.getElementById(s).style.display=s===id?'block':'none';document.querySelectorAll('nav button').forEach(b=>b.classList.remove('on'));btn.classList.add('on');}
async function load(){await dash();await jobs();await docs();}
async function dash(){
  const rows=await tq("SELECT status,count(*) c FROM jobs WHERE status!='archived' GROUP BY status");
  const m={};rows.forEach(r=>m[r.status]=+r.c);
  const d=(await tq("SELECT (SELECT count(*) FROM jobs WHERE first_seen>(SELECT v FROM meta WHERE k='prev_run')) nw,(SELECT count(*) FROM jobs WHERE closed_at>(SELECT v FROM meta WHERE k='prev_run')) cl,(SELECT v FROM meta WHERE k='last_run') lr"))[0];
  const ready=m.ready||0,applied=m.applied||0,inter=m.interviewing||0;
  const lr=(d.lr||'').replace('T',' ').slice(0,16);
  document.getElementById('dash').innerHTML=
   `<div class="stats">
      <div class="stat"><div class="n">${ready}</div><div class="l">Ready to apply</div></div>
      <div class="stat applied"><div class="n">${applied}</div><div class="l">Applied</div></div>
      <div class="stat interviewing"><div class="n">${inter}</div><div class="l">Interviewing</div></div>
      <div class="stat"><div class="n">${+d.nw||0}</div><div class="l">New (last refresh)</div></div>
    </div>
    <div class="delta">Since the last refresh: <span class="up">+${+d.nw||0} new</span> &nbsp; <span class="dn">-${+d.cl||0} closed</span>${lr?` &nbsp;<span class="muted">(updated ${lr})</span>`:''}</div>
    <p class="hint">${ready} role${ready===1?'':'s'} waiting. Open <b>Jobs</b> to apply. The list refreshes automatically each day.</p>`;
}
const STATUSES=['ready','applied','interviewing','rejected','archived'];
let JFILTER='active',JSORT='best',JREC='7d',JBANDS={green:true,amber:false,red:false};
function band(f){f=+f;return f>=7?'green':f>=5?'amber':'red';}
function setBand(b,on){JBANDS[b]=on;renderJobs();}
let JMINSAL=50000;
function setMin(v){JMINSAL=+v;renderJobs();}
function salLow(s){if(!s)return 0;const m=String(s).replace(/,/g,'').match(/£\s?(\d+(?:\.\d+)?)\s?(k?)/i);if(!m)return 0;let n=parseFloat(m[1]);if(m[2]||n<1000)n=n*1000;return n;}
const BIGTECH=['meta','facebook','instagram','amazon',' aws','apple','netflix','tiktok','bytedance','snap','spotify','google','youtube','microsoft','prime video'];
function cvFor(co){co=' '+(co||'').toLowerCase();return BIGTECH.some(k=>co.includes(k))?'bigtech':'media';}
const DOCXMIME='application/vnd.openxmlformats-officedocument.wordprocessingml.document';
function dlCV(track){if(track==='bigtech')getdoc('cv-bigtech-docx','Gabe-Paoli-CV-BigTech',DOCXMIME);else getdoc('cv-media-docx','Gabe-Paoli-CV-Media',DOCXMIME);}
const fmtd=s=>{if(!s)return'';const d=new Date(String(s).replace(' ','T')+'Z');return isNaN(d)?'':d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});};
function postedLabel(j){const raw=j.posted||j.first_seen;if(!raw)return'';const d=new Date(String(raw).replace(' ','T'));if(isNaN(d))return'';const days=Math.floor((Date.now()-d.getTime())/864e5);const t=days<=0?'today':days===1?'1 day ago':days+' days ago';return(j.posted?'Posted ':'Added ')+t;}
const genLetter=(co,ro)=>`Dear ${co} team,\n\nI am applying for the ${ro} role. I am a senior producer with 15+ years delivering integrated film, branded content and social at scale for global brands like Vodafone, Nike and Vogue. I own budgets up to 2M pounds across 500+ campaigns and 20+ markets, and build the production systems and AI-supported workflows that keep quality high as volume grows.\n\nOne standout: I produced Rolls-Royce's record-breaking Spirit of Innovation launch (25M+ reach). I would bring that mix of operational rigour, creative judgement and calm delivery to ${co}.\n\nI am London-based and available on one month notice, and would love to talk.\n\nBest,\nGabe Paoli`;
const genDM=(co,ro)=>`Hi [NAME], quick hello. I produce film and branded content at scale for global brands (Vodafone, Nike, Vogue) and have just applied for the ${ro} role at ${co}. Happy to share my reel and a one-pager. Would love to connect.`;
function setFilter(v){JFILTER=v;renderJobs();}
function setSort(v){JSORT=v;renderJobs();}
function setRec(v){JREC=v;renderJobs();}
async function jobs(){
  document.getElementById('jobs').innerHTML=`<div class="controls">
    <select id="fsel" onchange="setFilter(this.value)"><option value="active">All active</option><option value="ready">Ready</option><option value="applied">Applied</option><option value="interviewing">Interviewing</option><option value="rejected">Rejected</option><option value="archived">Archived</option><option value="closed">Closed</option></select>
    <select id="rsel" onchange="setRec(this.value)"><option value="any">Any time</option><option value="24h">Posted 24h</option><option value="7d">Posted 7 days</option><option value="14d">Posted 14 days</option></select>
    <select id="ssel" onchange="setSort(this.value)"><option value="best">then: best fit</option><option value="fit">then: fit only</option><option value="recent">then: recent activity</option><option value="oldest">then: oldest activity</option></select>
    <select id="msel" onchange="setMin(this.value)"><option value="0">Any salary</option><option value="40000">Min £40k</option><option value="50000">Min £50k</option><option value="60000">Min £60k</option><option value="70000">Min £70k</option><option value="80000">Min £80k</option></select>
    <span class="bandf">Show <label><input type="checkbox" id="bg" onchange="setBand('green',this.checked)"><span class="dotg">●</span> Green (7+)</label><label><input type="checkbox" id="ba" onchange="setBand('amber',this.checked)"><span class="dota">●</span> Amber (5-6)</label><label><input type="checkbox" id="br" onchange="setBand('red',this.checked)"><span class="dotr">●</span> Red</label></span>
  </div><div id="joblist"></div>`;
  document.getElementById('fsel').value=JFILTER;document.getElementById('ssel').value=JSORT;document.getElementById('rsel').value=JREC;document.getElementById('msel').value=JMINSAL;
  document.getElementById('bg').checked=JBANDS.green;document.getElementById('ba').checked=JBANDS.amber;document.getElementById('br').checked=JBANDS.red;
  await renderJobs();
}
async function renderJobs(){
  const where=JFILTER==='active'?"status NOT IN('archived','closed')":"status='"+JFILTER+"'";
  let rows=await tq("SELECT *, (first_seen>(SELECT v FROM meta WHERE k='prev_run')) isnew FROM jobs WHERE "+where);
  const pd=j=>new Date(String(j.posted||j.first_seen||'').replace(' ','T'));
  if(JREC!=='any'){const days=JREC==='24h'?1:JREC==='7d'?7:14,cut=Date.now()-days*864e5;rows=rows.filter(j=>{const d=pd(j);return !isNaN(d)&&d.getTime()>=cut;});}
  rows=rows.filter(j=>JBANDS[band(j.fit)]);
  if(JMINSAL>0)rows=rows.filter(j=>{const lo=salLow(j.salary);return lo===0||lo>=JMINSAL;});
  const dayKey=j=>{const d=pd(j);return isNaN(d)?0:Math.floor(d.getTime()/864e5);};
  const sec=(a,b)=>{if(JSORT==='best'){const r=((b.status==='ready')-(a.status==='ready'));if(r)return r;return (+b.fit)-(+a.fit);}if(JSORT==='fit')return (+b.fit)-(+a.fit);if(JSORT==='recent')return new Date(b.updated_at)-new Date(a.updated_at);if(JSORT==='oldest')return new Date(a.updated_at)-new Date(b.updated_at);return 0;};
  rows.sort((a,b)=>(dayKey(b)-dayKey(a))||sec(a,b));
  const evs=await tq("SELECT job_id,status,at FROM events ORDER BY at");
  const em={};evs.forEach(e=>{(em[e.job_id]=em[e.job_id]||[]).push(e);});
  const list=document.getElementById('joblist');list.innerHTML=rows.length?'':'<p class="muted">No jobs in this view.</p>';
  for(const j of rows){
    let pk={};try{pk=JSON.parse(j.pack||'{}')}catch(e){}
    const L=pk.letter||genLetter(j.company,j.role), DM=pk.dm||genDM(j.company,j.role);
    const opts=STATUSES.map(s=>`<option value="${s}" ${s===j.status?'selected':''}>${s[0].toUpperCase()+s.slice(1)}</option>`).join('');
    const contacts=(pk.contacts||[]).map(c=>`<div class="muted">${c[0]} - ${c[1]} &nbsp; <a href="https://${(c[2]||'').replace(/^https?:\/\//,'')}" target="_blank">profile</a></div>`).join('')||`<div class="muted">${pk.recipe||('Search LinkedIn for the hiring manager, talent lead or head of content at '+j.company+', then send the DM above.')}</div>`;
    const tl=['<span>Found '+fmtd(j.first_seen)+'</span>'].concat((em[j.id]||[]).map(e=>'<span><b>'+e.status[0].toUpperCase()+e.status.slice(1)+'</b> '+fmtd(e.at)+'</span>'));
    if(j.status==='closed'&&j.closed_at)tl.push('<span><b>Closed</b> '+fmtd(j.closed_at)+'</span>');
    const d=document.createElement('div');d.className='card';
    d.innerHTML=`<div class="top"><div><div class="co">${j.company}</div><div class="ro">${j.role} ${(+j.isnew)?'<span class="new">New</span>':''}</div></div><div class="topright"><span class="fit"><span class="tl-dot tl-${band(j.fit)}"></span>Fit ${(+j.fit).toFixed(0)}/10</span><div class="pchip">${postedLabel(j)}</div></div></div>
      <div class="salrow"><span class="sal">${j.salary?j.salary:'Salary not stated'}</span><a href="https://www.glassdoor.co.uk/Search/results.htm?keyword=${encodeURIComponent(j.company)}" target="_blank">Glassdoor</a><a href="https://www.levels.fyi/?search=${encodeURIComponent(j.company)}" target="_blank">Levels.fyi</a><span class="cvrec">Use the <b>${cvFor(j.company)==='bigtech'?'Big Tech':'Creative'}</b> CV</span><button class="btn cvget" type="button">Get CV (Word)</button></div>
      <div class="row"><span class="badge ${j.status}">${j.status}</span>
        <a class="btn apply" href="${j.url}" target="_blank">Apply -></a>
        <button class="btn cpletter" type="button">Copy cover letter</button>
        <button class="btn cpdm" type="button">Copy DM</button>
        <select class="status" onchange="setStatus('${j.id}',this.value)">${opts}</select>
      </div>
      <div class="tl">${tl.join(' &middot; ')}</div>
      <details><summary>Who to contact + how to apply</summary>${contacts}
        ${pk.steps?'<pre class="tpl">'+pk.steps.map((s,i)=>(i+1)+'. '+s.replace(/<[^>]+>/g,'')).join('\n')+'</pre>':''}
        <pre class="tpl">${L.replace(/</g,'&lt;')}</pre></details>`;
    {const x=d.querySelector('.cpletter');x.addEventListener('click',()=>copy(L,'Cover letter'));
     const y=d.querySelector('.cpdm');y.addEventListener('click',()=>copy(DM,'DM'));
     const z=d.querySelector('.cvget');if(z)z.addEventListener('click',()=>dlCV(cvFor(j.company)));}
    list.appendChild(d);
  }
}
async function setStatus(id,st){await tq("UPDATE jobs SET status=?,updated_at=datetime('now'),applied_at=CASE WHEN ?='applied' THEN datetime('now') ELSE applied_at END WHERE id=?",[st,st,id]);await tq("INSERT INTO events(job_id,status,at) VALUES(?,?,datetime('now'))",[id,st]);toast('Saved: '+st);dash();renderJobs();}
async function docs(){
  const rows=await tq("SELECT id,name,descr,mime FROM docs ORDER BY rowid");
  document.getElementById('docs').innerHTML='<p class="hint">Your latest documents (private, stored encrypted). Tap to download. Use the ATS .docx for portals; branded PDFs for humans.</p>'+
    rows.map(r=>`<div class="docrow" onclick="getdoc('${r.id}','${r.name.replace(/'/g,"")}','${r.mime}')">${r.name}<span>${r.descr||''}</span></div>`).join('');
}
async function getdoc(id,name,mime){
  toast('Fetching...');
  const r=(await tq("SELECT b64 FROM docs WHERE id=?",[id]))[0];
  const bytes=b64d(r.b64);const blob=new Blob([bytes],{type:mime});
  const ext=mime.includes('word')?'.docx':'.pdf';
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name.replace(/[^a-z0-9]+/gi,'-')+ext;a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),4000);
}
// boot: localStorage (remembered) -> sessionStorage -> #key= in URL
(function(){
  const saved=localStorage.getItem('cfg')||sessionStorage.getItem('cfg');
  if(saved){CFG=JSON.parse(saved);show();return;}
  const h=new URLSearchParams(location.hash.slice(1));const k=h.get('key')||h.get('k');
  if(k){decryptCfg(k).then(c=>{CFG=c;localStorage.setItem('cfg',JSON.stringify(c));history.replaceState(null,'',location.pathname);show();}).catch(()=>{});}
